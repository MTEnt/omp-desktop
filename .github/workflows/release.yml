name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal
            os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - name: Windows x64
            os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: --bundles nsis
          - name: Linux x64
            os: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: --bundles deb,rpm,appimage

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.1
          components: clippy
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release-${{ matrix.os }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            rpm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install UI dependencies
        run: npm --prefix ui ci --ignore-scripts

      - name: Verify contracts
        run: npm test && npm run lint

      # Unsigned releases are intentional until Apple notarization secrets are configured.
      # Do not require APPLE_* signing env vars.
      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: OMP Desktop ${{ github.ref_name }}
          releaseBody: |
            Desktop build for stock OMP 17+.
            See README for install requirements.

            **Linux artifacts:** `.deb`, `.rpm`, and `.AppImage` (plus the portable binary from CI artifacts on push builds).

            **Note:** macOS builds are unsigned until notarization secrets are configured.
            On first open, use System Settings → Privacy & Security → Open Anyway if Gatekeeper blocks the app.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri-args }}
