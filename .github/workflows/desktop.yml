name: Desktop

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal
            os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
            artifact-name: omp-desktop-macos-universal
          - name: Windows x64
            os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: --bundles nsis
            artifact-name: omp-desktop-windows-x64
          - name: Linux x64
            os: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: --bundles deb,rpm,appimage
            artifact-name: omp-desktop-linux-x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.1
          components: clippy
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.artifact-name }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install UI dependencies
        run: npm --prefix ui ci --ignore-scripts

      - name: Verify contracts
        run: npm test && npm run lint

      - name: Build desktop bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.tauri-args }}

      - name: Upload Linux installers and portable executable
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/app
          if-no-files-found: error

      - name: Upload macOS installer
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Windows installer and portable executable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/app.exe
          if-no-files-found: error
